<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Studio Code - Code Editing. Redefined</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="shortcut icon" href="./assets/vscode.png" type="image/x-icon">
</head>
<body>
  
  <header>
    <nav>
      <section id="icon-text">
        <img src="./assets/vscode.png" alt="VS Code icon" class="vscode-icon" />
        <h2 class="quicksand quicksand-500">Visual Studio Code</h2>
      </section>
      <section id="links" class="quicksand quicksand-400">
        <a href="">Docs</a>
        <a href="">Updates</a>
        <a href="">Blog</a>
        <a href="">API</a>
        <a href="">Extensions</a>
        <a href="">FAQ</a>
        <a href="">GitHub Copilot</a>
      </section>
    </nav>
    <section class="misc">
      <button class="btn-color-mode"><img src="./assets/lightmode.png" alt="Light/Dark Mode" class="color-mode-img"/></button>
      <div class="search-input-box">
        <img src="./assets/search.png" alt="Search button">
        <input type="text" placeholder="Search" />
      </div>
      <button class="btn-download">Download</button>
    </section>
  </header>

  <main>
    <section id="sec-1">
      <section id="sec-1-text">
        <h1>Your code editor.</h1>
        <h1>Redefined with AI.</h1>
      </section>
      <section id="download-btn">
        <button>Debian, Ubuntu, ...</button>
        <button>RedHat, Fedora, ...</button>
        <button>Get Copilot Free</button>
      </section>
      <section id="download-btn-other">
        <p><a href="#">Web</a>, <a href="">Insiders edition</a>, or <a href="">other platforms</a></p>
      </section>
      <section id="agreement">
        <p>By using VS Code, you agree to its <a href="">license</a> and <a href="">privacy statement</a>.</p>
      </section>
    </section>
    <section id="sec-2">
      <img src="" alt="">
    </section>
  </main>

</body>
</html>
